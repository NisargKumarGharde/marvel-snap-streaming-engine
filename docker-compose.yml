version: '3.8'

services:
  kafka:
    image: apache/kafka:latest
    container_name: snap-kafka-broker
    ports:
      - "9092:9092"
  cassandra:
    image: cassandra:latest
    container_name: snap-cassandra-db
    ports:
      - "9042:9042"
    environment:
      # Limiting memory so it runs smoothly on the free GitHub Codespace tier
      - CASSANDRA_CLUSTER_NAME=SnapCluster
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    healthcheck:
      test: ["CMD-SHELL", "[ $$(nodetool statusgossip) = running ]"]
      interval: 30s
      timeout: 10s
      retries: 5